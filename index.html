<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SMH After-Hours Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f14;
      --surface: #161b26;
      --surface2: #1e2535;
      --border: #2a3147;
      --text: #e2e8f0;
      --muted: #8892a4;
      --green: #22c55e;
      --green-dim: #16a34a22;
      --red: #ef4444;
      --red-dim: #dc262622;
      --yellow: #f59e0b;
      --accent: #6366f1;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      padding: 24px 16px;
    }

    header {
      max-width: 900px;
      margin: 0 auto 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-badge {
      background: var(--accent);
      color: #fff;
      font-weight: 700;
      font-size: 14px;
      padding: 4px 10px;
      border-radius: 6px;
      letter-spacing: 0.5px;
    }

    h1 {
      font-size: 20px;
      font-weight: 600;
      color: var(--text);
    }

    .subtitle {
      font-size: 13px;
      color: var(--muted);
      margin-top: 2px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #last-updated {
      font-size: 12px;
      color: var(--muted);
    }

    #refresh-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 7px 14px;
      border-radius: 7px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.15s, border-color 0.15s;
    }

    #refresh-btn:hover { background: var(--border); }
    #refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .market-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      border: 1px solid var(--border);
    }

    .market-status .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
    }

    .status-open .dot { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .status-after .dot { background: var(--yellow); box-shadow: 0 0 6px var(--yellow); }
    .status-pre .dot { background: #818cf8; box-shadow: 0 0 6px #818cf8; }
    .status-closed .dot { background: var(--muted); }

    .cards-grid {
      max-width: 900px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 14px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px;
      transition: border-color 0.2s, transform 0.1s;
      position: relative;
      overflow: hidden;
    }

    .card:hover {
      border-color: var(--accent);
      transform: translateY(-1px);
    }

    .card.up { border-left: 3px solid var(--green); }
    .card.down { border-left: 3px solid var(--red); }
    .card.neutral { border-left: 3px solid var(--muted); }

    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .ticker {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    .rank {
      font-size: 11px;
      color: var(--muted);
      font-weight: 500;
      background: var(--surface2);
      padding: 2px 7px;
      border-radius: 4px;
    }

    .company-name {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .price-section {
      margin-bottom: 10px;
    }

    .price-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .price-label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 3px;
    }

    .regular-price {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 12px 0;
    }

    .ah-section {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .ah-label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    .ah-price {
      font-size: 18px;
      font-weight: 700;
    }

    .change-badge {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 3px 8px;
      border-radius: 5px;
      font-size: 13px;
      font-weight: 600;
    }

    .change-badge.up { background: var(--green-dim); color: var(--green); }
    .change-badge.down { background: var(--red-dim); color: var(--red); }
    .change-badge.neutral { background: var(--surface2); color: var(--muted); }

    .section-header {
      grid-column: 1 / -1;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      padding: 4px 2px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 2px;
    }

    .etf-badge {
      background: var(--accent);
      color: #fff;
      font-weight: 700;
    }

    .etf-card {
      background: #1a1f32;
      border-color: #3a4060;
    }

    .etf-card:hover { border-color: var(--accent); }

    .weight-bar {
      margin-top: 12px;
    }

    .weight-text {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .bar-track {
      height: 3px;
      background: var(--surface2);
      border-radius: 2px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.6s ease;
    }

    .skeleton {
      background: linear-gradient(90deg, var(--surface2) 25%, var(--border) 50%, var(--surface2) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 4px;
      height: 16px;
    }

    @keyframes shimmer { to { background-position: -200% 0; } }

    .error-banner {
      max-width: 900px;
      margin: 0 auto 16px;
      background: var(--red-dim);
      border: 1px solid var(--red);
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 13px;
      color: var(--red);
      display: none;
    }

    .summary-bar {
      max-width: 900px;
      margin: 0 auto 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 18px;
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
    }

    .summary-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .summary-label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    .summary-value {
      font-size: 16px;
      font-weight: 600;
    }

    @media (max-width: 500px) {
      .cards-grid { grid-template-columns: 1fr; }
      h1 { font-size: 17px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-badge">SMH</span>
    <div>
      <h1>After-Hours Tracker</h1>
      <div class="subtitle">Top 10 SMH Semiconductor ETF Holdings</div>
    </div>
  </div>
  <div class="header-right">
    <div id="market-status" class="market-status status-closed">
      <span class="dot"></span>
      <span id="status-text">–</span>
    </div>
    <span id="last-updated"></span>
    <button id="refresh-btn" onclick="loadData()">
      <div class="spinner" id="spinner"></div>
      <span id="refresh-label">Refresh</span>
    </button>
  </div>
</header>

<div class="error-banner" id="error-banner"></div>

<div class="summary-bar" id="summary-bar" style="display:none">
  <div class="summary-item">
    <span class="summary-label">Gainers</span>
    <span class="summary-value" id="sum-gainers" style="color:var(--green)">–</span>
  </div>
  <div class="summary-item">
    <span class="summary-label">Losers</span>
    <span class="summary-value" id="sum-losers" style="color:var(--red)">–</span>
  </div>
  <div class="summary-item">
    <span class="summary-label">Avg AH Change</span>
    <span class="summary-value" id="sum-avg">–</span>
  </div>
  <div class="summary-item">
    <span class="summary-label">Best AH</span>
    <span class="summary-value" id="sum-best" style="color:var(--green)">–</span>
  </div>
  <div class="summary-item">
    <span class="summary-label">Worst AH</span>
    <span class="summary-value" id="sum-worst" style="color:var(--red)">–</span>
  </div>
</div>

<div class="cards-grid" id="grid"></div>

<script>
  // ETFs tracked separately (no weight bar)
  const ETFS = [
    { ticker: 'SMH', name: 'VanEck Semiconductor ETF', etf: true },
    { ticker: 'QQQ', name: 'Invesco QQQ Trust (Nasdaq-100)', etf: true },
  ];

  // Top 10 SMH holdings (as of early 2025) with approximate weights
  const HOLDINGS = [
    { ticker: 'NVDA',  name: 'NVIDIA Corporation',             weight: 20.87 },
    { ticker: 'AVGO',  name: 'Broadcom Inc.',                  weight: 8.37  },
    { ticker: 'TSM',   name: 'Taiwan Semiconductor (ADR)',      weight: 8.29  },
    { ticker: 'ASML',  name: 'ASML Holding N.V.',              weight: 4.44  },
    { ticker: 'AMD',   name: 'Advanced Micro Devices',         weight: 4.32  },
    { ticker: 'QCOM',  name: 'Qualcomm Incorporated',          weight: 4.26  },
    { ticker: 'TXN',   name: 'Texas Instruments',              weight: 4.20  },
    { ticker: 'AMAT',  name: 'Applied Materials Inc.',         weight: 4.09  },
    { ticker: 'MU',    name: 'Micron Technology',              weight: 3.08  },
    { ticker: 'INTC',  name: 'Intel Corporation',              weight: 2.49  },
  ];

  const ALL_ITEMS = [...ETFS, ...HOLDINGS];
  const MAX_WEIGHT = Math.max(...HOLDINGS.map(h => h.weight));

  function fmt(n, decimals = 2) {
    if (n == null || isNaN(n)) return '–';
    return n.toLocaleString('en-US', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
  }

  function fmtPrice(n) {
    if (n == null || isNaN(n)) return '–';
    return '$' + fmt(n, 2);
  }

  function getMarketStatus() {
    const now = new Date();
    // Convert to ET
    const etOffset = -4; // EDT; use -5 for EST
    const utc = now.getTime() + now.getTimezoneOffset() * 60000;
    const et = new Date(utc + 3600000 * etOffset);
    const day = et.getDay(); // 0=Sun, 6=Sat
    const h = et.getHours();
    const m = et.getMinutes();
    const mins = h * 60 + m;

    if (day === 0 || day === 6) return 'closed';
    if (mins >= 4 * 60 && mins < 9 * 60 + 30) return 'pre';
    if (mins >= 9 * 60 + 30 && mins < 16 * 60) return 'open';
    if (mins >= 16 * 60 && mins < 20 * 60) return 'after';
    return 'closed';
  }

  function updateMarketStatus(status) {
    const el = document.getElementById('market-status');
    const txt = document.getElementById('status-text');
    el.className = 'market-status';
    const map = {
      open:   ['status-open',   'Market Open'],
      after:  ['status-after',  'After Hours'],
      pre:    ['status-pre',    'Pre-Market'],
      closed: ['status-closed', 'Market Closed'],
    };
    const [cls, label] = map[status] || map.closed;
    el.classList.add(cls);
    txt.textContent = label;
  }

  function buildSkeletons() {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    // Insert section headers
    grid.innerHTML += `<div class="section-header" id="section-etfs">ETFs</div>`;
    ALL_ITEMS.forEach((h, i) => {
      if (i === ETFS.length) {
        grid.innerHTML += `<div class="section-header" id="section-holdings">Top 10 Holdings</div>`;
      }
      const rankBadge = h.etf
        ? `<span class="rank etf-badge">ETF</span>`
        : `<span class="rank">#${i - ETFS.length + 1}</span>`;
      const weightSection = h.etf ? '' : `
          <div class="weight-bar">
            <div class="weight-text">ETF Weight: ${h.weight}%</div>
            <div class="bar-track"><div class="bar-fill" style="width:${(h.weight / MAX_WEIGHT) * 100}%"></div></div>
          </div>`;
      grid.innerHTML += `
        <div class="card neutral${h.etf ? ' etf-card' : ''}" id="card-${h.ticker}">
          <div class="card-header">
            <span class="ticker">${h.ticker}</span>
            ${rankBadge}
          </div>
          <div class="company-name">${h.name}</div>
          <div class="price-section">
            <div class="price-label">Regular Close</div>
            <div class="skeleton" style="width:100px;height:24px;margin-top:4px"></div>
          </div>
          <hr class="divider"/>
          <div class="ah-section">
            <div>
              <div class="ah-label">After Hours</div>
              <div class="skeleton" style="width:80px;height:20px;margin-top:4px"></div>
            </div>
            <div class="skeleton" style="width:70px;height:26px"></div>
          </div>
          ${weightSection}
        </div>`;
    });
  }

  function renderCard(h, i, q) {
    const card = document.getElementById('card-' + h.ticker);
    if (!card) return;

    const regularPrice = q.regularMarketPrice;
    const ahPrice = q.postMarketPrice;
    const ahChange = q.postMarketChange;
    const ahChangePct = q.postMarketChangePercent;

    // Also check pre-market
    const prePrice = q.preMarketPrice;
    const preChange = q.preMarketChange;
    const preChangePct = q.preMarketChangePercent;

    const status = getMarketStatus();
    let showPrice, showChange, showChangePct, sessionLabel;

    if (status === 'pre' && prePrice != null) {
      showPrice = prePrice;
      showChange = preChange;
      showChangePct = preChangePct;
      sessionLabel = 'Pre-Market';
    } else if (ahPrice != null) {
      showPrice = ahPrice;
      showChange = ahChange;
      showChangePct = ahChangePct;
      sessionLabel = 'After Hours';
    } else {
      showPrice = regularPrice;
      showChange = q.regularMarketChange;
      showChangePct = q.regularMarketChangePercent;
      sessionLabel = 'Regular Close';
    }

    const dir = showChange > 0 ? 'up' : showChange < 0 ? 'down' : 'neutral';
    const arrow = showChange > 0 ? '▲' : showChange < 0 ? '▼' : '–';
    const sign = showChange > 0 ? '+' : '';

    // Regular close day change
    const regChange = q.regularMarketChange;
    const regChangePct = q.regularMarketChangePercent;
    const regDir = regChange > 0 ? 'up' : regChange < 0 ? 'down' : 'neutral';
    const regSign = regChange > 0 ? '+' : '';
    const regArrow = regChange > 0 ? '▲' : regChange < 0 ? '▼' : '–';

    const rankBadge = h.etf
      ? `<span class="rank etf-badge">ETF</span>`
      : `<span class="rank">#${i - ETFS.length + 1}</span>`;
    const weightSection = h.etf ? '' : `
      <div class="weight-bar">
        <div class="weight-text">ETF Weight: ${h.weight}%</div>
        <div class="bar-track"><div class="bar-fill" style="width:${(h.weight / MAX_WEIGHT) * 100}%"></div></div>
      </div>`;

    card.className = `card ${dir}${h.etf ? ' etf-card' : ''}`;
    card.innerHTML = `
      <div class="card-header">
        <span class="ticker">${h.ticker}</span>
        ${rankBadge}
      </div>
      <div class="company-name">${h.name}</div>
      <div class="price-section">
        <div class="price-label">Regular Close</div>
        <div class="price-row">
          <span class="regular-price">${fmtPrice(regularPrice)}</span>
          <span class="change-badge ${regDir}" style="font-size:12px;padding:2px 6px">
            ${regArrow} ${regSign}${fmt(regChangePct, 2)}%
          </span>
        </div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px">${regSign}${fmtPrice(regChange)} today</div>
      </div>
      <hr class="divider"/>
      <div class="ah-section">
        <div>
          <div class="ah-label">${sessionLabel}</div>
          <div class="ah-price">${fmtPrice(showPrice)}</div>
          <div style="font-size:11px;color:var(--muted);margin-top:2px">${sign}${fmtPrice(showChange)} from close</div>
        </div>
        <span class="change-badge ${dir}">
          ${arrow} ${sign}${fmt(showChangePct, 2)}%
        </span>
      </div>
      ${weightSection}`;
  }

  function updateSummary(quotes) {
    const validQuotes = quotes.filter(q => q && q.postMarketChangePercent != null);
    if (validQuotes.length === 0) return;

    const gainers = validQuotes.filter(q => q.postMarketChange > 0).length;
    const losers  = validQuotes.filter(q => q.postMarketChange < 0).length;
    const avg = validQuotes.reduce((s, q) => s + q.postMarketChangePercent, 0) / validQuotes.length;

    const best  = validQuotes.reduce((a, b) => b.postMarketChangePercent > a.postMarketChangePercent ? b : a);
    const worst = validQuotes.reduce((a, b) => b.postMarketChangePercent < a.postMarketChangePercent ? b : a);

    document.getElementById('sum-gainers').textContent = gainers;
    document.getElementById('sum-losers').textContent  = losers;

    const avgEl = document.getElementById('sum-avg');
    avgEl.textContent = (avg >= 0 ? '+' : '') + fmt(avg, 2) + '%';
    avgEl.style.color = avg >= 0 ? 'var(--green)' : 'var(--red)';

    document.getElementById('sum-best').textContent  = `${best.symbol}  +${fmt(best.postMarketChangePercent, 2)}%`;
    document.getElementById('sum-worst').textContent = `${worst.symbol}  ${fmt(worst.postMarketChangePercent, 2)}%`;

    document.getElementById('summary-bar').style.display = 'flex';
  }

  // Three proxies tried in order for every request
  const PROXIES = [
    u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
    u => `https://corsproxy.io/?url=${encodeURIComponent(u)}`,
    u => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`,
  ];

  // Fetch via proxy, skip if response is HTML (Yahoo consent/login page)
  async function proxyFetch(yahooUrl, asText = false, timeoutMs = 8000) {
    let lastErr = 'no proxies attempted';
    for (const proxify of PROXIES) {
      const ctrl = new AbortController();
      const timer = setTimeout(() => ctrl.abort(), timeoutMs);
      try {
        const res = await fetch(proxify(yahooUrl), { signal: ctrl.signal });
        clearTimeout(timer);
        const text = await res.text();
        const t = text.trim();
        // Reject HTML responses (Yahoo consent/login pages)
        if (t.startsWith('<')) { lastErr = 'got HTML (consent/login page)'; continue; }
        if (asText) return t;
        if (!t.startsWith('{') && !t.startsWith('[')) { lastErr = 'unexpected response: ' + t.slice(0, 40); continue; }
        return JSON.parse(t);
      } catch (e) {
        clearTimeout(timer);
        lastErr = e.message;
      }
    }
    throw new Error(lastErr);
  }

  const FIELDS = 'regularMarketPrice,regularMarketChange,regularMarketChangePercent,postMarketPrice,postMarketChange,postMarketChangePercent,preMarketPrice,preMarketChange,preMarketChangePercent';

  // Strategy 1: crumb-based v7 quote API
  async function fetchViaCrumb(tickers) {
    const crumb = await proxyFetch('https://query2.finance.yahoo.com/v1/test/getcrumb', true);
    if (!crumb || crumb.length < 3 || crumb.startsWith('<')) throw new Error('bad crumb: ' + crumb.slice(0, 30));
    const url = `https://query2.finance.yahoo.com/v7/finance/quote?symbols=${tickers}&fields=${FIELDS}&crumb=${encodeURIComponent(crumb)}`;
    const data = await proxyFetch(url);
    const results = data?.quoteResponse?.result || [];
    if (results.length === 0) throw new Error('empty quote results');
    return results;
  }

  // Strategy 2: per-symbol v8 chart API (parallel, all proxies per symbol)
  async function fetchViaChartAPI() {
    const fetches = ALL_ITEMS.map(async h => {
      const url = `https://query1.finance.yahoo.com/v8/finance/chart/${h.ticker}?interval=1m&range=1d&includePrePost=true`;
      try {
        const data = await proxyFetch(url);
        const meta = data?.chart?.result?.[0]?.meta;
        if (!meta?.regularMarketPrice) return null;
        const prevClose = meta.chartPreviousClose || meta.regularMarketPrice;
        const regChange = meta.regularMarketPrice - prevClose;
        const postChange = meta.postMarketPrice != null ? meta.postMarketPrice - meta.regularMarketPrice : null;
        const preChange  = meta.preMarketPrice  != null ? meta.preMarketPrice  - meta.regularMarketPrice : null;
        return {
          symbol: h.ticker,
          regularMarketPrice: meta.regularMarketPrice,
          regularMarketChange: regChange,
          regularMarketChangePercent: prevClose ? (regChange / prevClose) * 100 : 0,
          postMarketPrice: meta.postMarketPrice ?? null,
          postMarketChange: postChange,
          postMarketChangePercent: postChange != null ? (postChange / meta.regularMarketPrice) * 100 : null,
          preMarketPrice: meta.preMarketPrice ?? null,
          preMarketChange: preChange,
          preMarketChangePercent: preChange != null ? (preChange / meta.regularMarketPrice) * 100 : null,
        };
      } catch (e) { return null; }
    });
    const valid = (await Promise.all(fetches)).filter(Boolean);
    if (valid.length === 0) throw new Error('all chart requests failed across all proxies');
    return valid;
  }

  async function loadData() {
    const btn       = document.getElementById('refresh-btn');
    const spinner   = document.getElementById('spinner');
    const label     = document.getElementById('refresh-label');
    const errBanner = document.getElementById('error-banner');

    btn.disabled = true;
    spinner.style.display = 'block';
    label.textContent = 'Loading…';
    errBanner.style.display = 'none';

    buildSkeletons();
    updateMarketStatus(getMarketStatus());

    const tickers = ALL_ITEMS.map(h => h.ticker).join(',');

    try {
      let results;
      try {
        results = await fetchViaCrumb(tickers);
      } catch (e1) {
        console.warn('Crumb failed:', e1.message);
        try {
          results = await fetchViaChartAPI();
        } catch (e2) {
          throw new Error(`Crumb: ${e1.message} | Chart: ${e2.message}`);
        }
      }

      const map = {};
      results.forEach(q => { map[q.symbol] = q; });

      const allQuotes = [];
      ALL_ITEMS.forEach((h, i) => {
        const q = map[h.ticker];
        if (q) { renderCard(h, i, q); allQuotes.push(q); }
      });

      updateSummary(allQuotes);
      document.getElementById('last-updated').textContent =
        'Updated ' + new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' });

    } catch (err) {
      errBanner.textContent = `Failed to load data — ${err.message}`;
      errBanner.style.display = 'block';
      console.error(err);
    } finally {
      btn.disabled = false;
      spinner.style.display = 'none';
      label.textContent = 'Refresh';
    }
  }

  loadData();
  setInterval(loadData, 60000);
</script>
</body>
</html>
